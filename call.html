<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SafeWalk - Фейковый звонок</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #0f2b1d 0%, #1a4d2f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Основной экран звонка */
        .call-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 100px;
            min-height: 100vh;
        }

        /* Верхняя панель с переключателем ролей */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
        }

        .role-toggle {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .role-switch {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .role-switch .guardian-text {
            display: none;
        }

        .role-toggle:checked + .role-switch {
            background: #22c55e;
            border-color: #ffffff;
        }

        .role-toggle:checked + .role-switch .peaceful-text {
            display: none;
        }

        .role-toggle:checked + .role-switch .guardian-text {
            display: inline;
        }

        /* Информация о звонящем */
        .caller-info {
            text-align: center;
            margin-top: 40px;
        }

        .call-status {
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .caller-name {
            font-size: 42px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .caller-number {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        /* Контейнер с кнопками */
        .action-area {
            margin-bottom: 60px;
            text-align: center;
        }

        /* Кнопка набора (телефонная иконка) */
        .dial-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #22c55e, #15803d);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 12px 25px rgba(34, 197, 94, 0.4);
        }

        .dial-btn:active {
            transform: scale(0.95);
        }

        /* SVG иконка телефона */
        .phone-icon {
            width: 48px;
            height: 48px;
            fill: white;
        }

        /* Группа кнопок управления звонком (скрыта по умолчанию) */
        .call-controls-group {
            display: none;
            gap: 30px;
            justify-content: center;
        }
.control-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: white;
        }

        .control-btn svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .decline-btn {
            background: linear-gradient(145deg, #ef4444, #b91c1c);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        .accept-btn {
            background: linear-gradient(145deg, #22c55e, #15803d);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        /* Чекбокс для переключения режимов звонка (без JS) */
        .call-toggle {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* Когда чекбокс не выбран — показываем кнопку набора, скрываем панель управления */
        .call-toggle:not(:checked) ~ .action-area .call-controls-group {
            display: none;
        }

        .call-toggle:not(:checked) ~ .action-area .dial-btn {
            display: inline-flex;
        }

        /* Когда чекбокс выбран — скрываем кнопку набора, показываем панель управления */
        .call-toggle:checked ~ .action-area .dial-btn {
            display: none;
        }

        .call-toggle:checked ~ .action-area .call-controls-group {
            display: inline-flex;
        }

        /* Изменяем статус звонка через соседние селекторы */
        .call-toggle:not(:checked) ~ .caller-info .call-status::before {
            content: "Готов к набору";
        }

        .call-toggle:checked ~ .caller-info .call-status::before {
            content: "📞 Вызов...";
        }

        /* Убираем оригинальный текст статуса */
        .call-status span {
            display: none;
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 16px;
            width: min(640px, 92vw);
            display: flex;
            gap: 8px;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            padding: 8px 12px;
            z-index: 100;
        }

        .nav-link {
            flex: 1;
            text-align: center;
            color: #14532d;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 8px;
            border-radius: 40px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .nav-link.active {
            background: #16a34a;
            color: white;
        }

        .nav-link.sos {
            background: #dc2626;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin-top: -18px;
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.4);
            font-weight: 800;
            font-size: 18px;
        }

        .nav-link.sos span {
            font-size: 20px;
        }
@media (max-width: 480px) {
            .caller-name {
                font-size: 32px;
            }
            .dial-btn {
                width: 80px;
                height: 80px;
            }
            .phone-icon {
                width: 38px;
                height: 38px;
            }
            .control-btn {
                width: 70px;
                height: 70px;
            }
            .control-btn svg {
                width: 26px;
                height: 26px;
            }
        }
    </style>
</head>
<body>
    <!-- Чекбокс для переключения режима "набрать / сбросить+ответить" (без JS) -->
    <input type="checkbox" id="callToggle" class="call-toggle">

    <div class="call-screen">
        <div class="top-bar">
            <input class="role-toggle" id="role-toggle" type="checkbox">
            <label class="role-switch" for="role-toggle">
                <span class="peaceful-text">👤 Мирный</span>
                <span class="guardian-text">🛡 Защитник</span>
            </label>
        </div>

        <div class="caller-info">
            <div class="call-status"><span>placeholder</span></div>
            <div class="caller-name">Служба безопасности</div>
            <div class="caller-number">SafeWalk Help</div>
        </div>

        <div class="action-area">
            <!-- Кнопка набора -->
            <label for="callToggle" class="dial-btn">
                <svg class="phone-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.28-.28.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
            </label>

            <!-- Группа кнопок управления звонком (появляется после нажатия набрать) -->
            <div class="call-controls-group">
                <label for="callToggle" class="control-btn decline-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                    <span>Сбросить</span>
                </label>
                <label for="callToggle" class="control-btn accept-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                    <span>Ответить</span>
                </label>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a class="nav-link active" href="#">📞 Звонок</a>
        <a class="nav-link sos" href="#"><span>🚨</span></a>
        <a class="nav-link" href="#">👤 Профиль</a>
    </nav>

    <audio autoplay loop>
        <source src="/static/ringtone.mp3" type="audio/mpeg">
    </audio>
</body>
</html>

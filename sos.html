<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SafeWalk - SOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="sos-page">
    <!-- Чекбокс для переключения состояния SOS -->
    <input type="checkbox" id="sosToggle" class="sos-toggle">
    
    <div class="sos-container">
        <div class="top-bar">
            <input class="role-toggle" id="role-toggle" type="checkbox">
            <label class="role-switch" for="role-toggle">
                <span class="peaceful-text">Мирный</span>
                <span class="guardian-text">Защитник</span>
            </label>
        </div>
        
        <!-- НАЧАЛЬНОЕ СОСТОЯНИЕ: большая кнопка SOS -->
        <div class="sos-initial">
            <label for="sosToggle" class="sos-button">
                <span class="sos-text">SOS</span>
                <span class="sos-subtitle">Позвать на помощь</span>
            </label>
        </div>
        
        <!-- СОСТОЯНИЕ ПОСЛЕ НАЖАТИЯ: сообщение об отправке -->
        <div class="sos-sent">
            <div class="sos-success-icon">🚨</div>
            <h1 class="sos-success-title">SOS отправлен!</h1>
            <p class="sos-success-message">Ваши координаты переданы хранителю</p>
            <div class="sos-coordinates">
                <span class="coord-label">📍 Текущее местоположение:</span>
                <span class="coord-value">53.9006, 27.5590</span>
            </div>
            <p class="sos-note">Хранитель получил уведомление и отслеживает ваш маршрут</p>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <a class="nav-link" href="call.html">Звонок</a>
        <a class="nav-link sos active" href="sos.html"><span>🚨</span></a>
        <a class="nav-link" href="profile.html">Профиль</a>
    </nav>

    <script>
    (function () {
        const KEY = "safewalk_role";
        const toggle = document.getElementById("role-toggle");
        
        const normalize = (v) => (v === "guardian" ? "guardian" : "peaceful");
        
        const readRole = () => {
            const fromStorage = localStorage.getItem(KEY);
            if (fromStorage) return normalize(fromStorage);
            if (toggle) return toggle.checked ? "guardian" : "peaceful";
            return "peaceful";
        };
        
        const applyRole = (role) => {
            const normalized = normalize(role);
            localStorage.setItem(KEY, normalized);
            if (toggle) toggle.checked = normalized === "guardian";
        };
        
        applyRole(readRole());
        
        if (toggle) {
            toggle.addEventListener("change", function () {
                applyRole(toggle.checked ? "guardian" : "peaceful");
            });
        }
    })();
    </script>
</body>
</html>
